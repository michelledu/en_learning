<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTA K3 Police Academy – Vocabulary</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a2744;
    min-height: 100vh;
    padding: 20px;
    color: #fff;
  }

  header {
    text-align: center;
    padding: 24px 16px 20px;
  }

  .badge-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 12px #ffd700aa);
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    color: #ffd700;
    letter-spacing: 0.5px;
  }

  header p {
    font-size: 13px;
    color: #9aadcf;
    margin-top: 4px;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 16px 0 22px;
    flex-wrap: wrap;
  }

  .btn-all {
    background: #ffd700;
    color: #1a2744;
    border: none;
    border-radius: 24px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    box-shadow: 0 4px 14px #ffd70055;
  }

  .btn-all:hover { transform: scale(1.04); box-shadow: 0 6px 20px #ffd70077; }
  .btn-all:active { transform: scale(.97); }

  .btn-stop {
    background: transparent;
    color: #9aadcf;
    border: 1.5px solid #9aadcf55;
    border-radius: 24px;
    padding: 10px 22px;
    font-size: 14px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }

  .btn-stop:hover { color: #fff; border-color: #fff; }

  .speed-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    font-size: 13px;
    color: #9aadcf;
  }

  .speed-row label { white-space: nowrap; }

  input[type=range] {
    -webkit-appearance: none;
    width: 110px;
    height: 4px;
    background: #2f4270;
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: #ffd700;
    border-radius: 50%;
    cursor: pointer;
  }

  #speed-label { font-weight: 700; color: #ffd700; min-width: 28px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
    max-width: 780px;
    margin: 0 auto;
  }

  .card {
    background: #243057;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .15s, background .15s, transform .1s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .card:hover { background: #2c3b6a; transform: translateY(-1px); }

  .card.playing {
    border-color: #ffd700;
    background: #2e3e72;
  }

  .card.playing::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: #ffd700;
    border-radius: 2px 0 0 2px;
  }

  .play-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #1a2744;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    transition: background .15s;
  }

  .card.playing .play-btn { background: #ffd700; }
  .card.playing .play-btn .icon { filter: none; }

  .icon { font-size: 15px; }

  .word-info { flex: 1; min-width: 0; }

  .word {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 3px;
  }

  .definition {
    font-size: 12px;
    color: #8fa3c8;
    line-height: 1.4;
  }

  .definition-zh {
    font-size: 11px;
    color: #ffd70099;
    margin-top: 2px;
    line-height: 1.4;
  }

  .zh-tag {
    display: inline-block;
    background: #ffd70022;
    color: #ffd700;
    font-size: 12px;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 8px;
    margin-left: 6px;
    vertical-align: middle;
    border: 1px solid #ffd70044;
  }

  .num {
    font-size: 11px;
    color: #4a5e88;
    font-weight: 600;
    flex-shrink: 0;
    width: 20px;
    text-align: right;
  }

  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: #4a5e88;
    padding-bottom: 20px;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <span class="badge-icon">🚔</span>
  <h1>Police Academy – Week 1 Vocabulary</h1>
  <p>点击单词卡片听发音 · Tap a card to hear it</p>
</header>

<div class="controls">
  <button class="btn-all" onclick="playAll()">▶ 朗读全部单词</button>
  <button class="btn-stop" onclick="stopAll()">⏹ 停止</button>
</div>

<div class="speed-row">
  <label>速度 Speed:</label>
  <input type="range" id="speed" min="0.5" max="1.2" step="0.1" value="0.8" oninput="updateSpeed(this.value)">
  <span id="speed-label">0.8×</span>
</div>

<div class="grid" id="grid"></div>

<footer>LTA K3 Police Academy · Vocabulary Homework Week 1</footer>

<script>
const words = [
  { word: "police officer", def: "a person whose job is to keep people safe",        zh: "警察",   defZh: "负责保护大家安全的人" },
  { word: "badge",          def: "a shiny metal star a police officer wears",         zh: "徽章",   defZh: "警察佩戴的闪亮金属星形标志" },
  { word: "uniform",        def: "special clothes you wear for your job",             zh: "制服",   defZh: "工作时穿的特殊衣服" },
  { word: "handcuffs",      def: "metal rings that lock around the wrists",           zh: "手铐",   defZh: "锁住手腕的金属环" },
  { word: "whistle",        def: "a small thing you blow to make a loud sound",       zh: "口哨",   defZh: "吹响后会发出大声的小工具" },
  { word: "siren",          def: "the loud sound and lights on a police car",         zh: "警报器", defZh: "警车上的响声和闪灯" },
  { word: "patrol",         def: "to drive or walk around to keep a place safe",      zh: "巡逻",   defZh: "开车或步行在周围巡查以保障安全" },
  { word: "arrest",         def: "to catch a lawbreaker and take them away",          zh: "逮捕",   defZh: "抓住违法者并将其带走" },
  { word: "catch",          def: "to run after and grab someone",                     zh: "追捕",   defZh: "追上去并抓住某人" },
  { word: "thief",          def: "a person who steals things",                        zh: "小偷",   defZh: "偷东西的人" },
  { word: "protect",        def: "to keep someone or something safe",                 zh: "保护",   defZh: "让某人或某物保持安全" },
  { word: "safe",           def: "not in danger; free from harm",                     zh: "安全的", defZh: "没有危险；不受伤害" },
  { word: "rescue",         def: "to save someone from danger",                       zh: "救援",   defZh: "把某人从危险中救出来" },
  { word: "help",           def: "to do something useful for someone",                zh: "帮助",   defZh: "为某人做有用的事" },
  { word: "duty",           def: "a job you must do",                                 zh: "职责",   defZh: "必须完成的工作" },
  { word: "law",            def: "a rule that everyone must follow",                  zh: "法律",   defZh: "每个人都必须遵守的规则" },
  { word: "report",         def: "writing that tells what happened",                  zh: "报告",   defZh: "记录发生了什么事的文字" },
  { word: "station",        def: "the building where police officers work",           zh: "警察局", defZh: "警察工作的地方" },
  { word: "brave",          def: "not afraid to do something hard",                   zh: "勇敢的", defZh: "不害怕做困难的事" },
  { word: "honest",         def: "always telling the truth",                          zh: "诚实的", defZh: "总是说真话" },
];

let rate = 0.8;
let currentUtter = null;
let playingIndex = -1;
let allTimer = null;

function updateSpeed(v) {
  rate = parseFloat(v);
  document.getElementById('speed-label').textContent = rate.toFixed(1) + '×';
}

function speak(text, onEnd) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = rate;
  u.pitch = 1;
  if (onEnd) u.onend = onEnd;
  currentUtter = u;
  window.speechSynthesis.speak(u);
  return u;
}

function setPlaying(i) {
  document.querySelectorAll('.card').forEach((c, idx) => {
    c.classList.toggle('playing', idx === i);
    c.querySelector('.icon').textContent = idx === i ? '🔊' : '▶';
  });
  playingIndex = i;
}

function speakSequence(parts, onDone) {
  // parts: array of { text, pause } where pause is ms to wait after speaking
  let idx = 0;
  function next() {
    if (idx >= parts.length) { if (onDone) onDone(); return; }
    const { text, pause } = parts[idx++];
    speak(text, () => {
      allTimer = setTimeout(next, pause || 0);
    });
  }
  next();
}

function playCard(i) {
  clearTimeout(allTimer);
  setPlaying(i);
  const { word, def } = words[i];
  speakSequence([
    { text: word, pause: 600 },
    { text: word, pause: 900 },
    { text: def,  pause: 0   },
  ], () => setPlaying(-1));
}

function playAll() {
  stopAll();
  let i = 0;
  function nextWord() {
    if (i >= words.length) { setPlaying(-1); return; }
    setPlaying(i);
    const { word, def } = words[i];
    i++;
    speakSequence([
      { text: word, pause: 600 },
      { text: word, pause: 900 },
      { text: def,  pause: 800 },
    ], nextWord);
  }
  nextWord();
}

function stopAll() {
  clearTimeout(allTimer);
  window.speechSynthesis.cancel();
  setPlaying(-1);
}

// Build grid
const grid = document.getElementById('grid');
words.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="play-btn"><span class="icon">▶</span></div>
    <div class="word-info">
      <div class="word">${item.word} <span class="zh-tag">${item.zh}</span></div>
      <div class="definition">${item.def}</div>
      <div class="definition-zh">${item.defZh}</div>
    </div>
    <div class="num">${String(i+1).padStart(2,'0')}</div>
  `;
  card.addEventListener('click', () => playCard(i));
  grid.appendChild(card);
});
</script>
</body>
</html>
